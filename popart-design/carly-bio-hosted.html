<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carly Bio</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;       /* sin scrollbar interno */
  }

  /* ── Wrapper ── */
  #cgbio {
    position: relative;
    width: 100%;
    line-height: 0;
    overflow: hidden;
  }

  /* ── Background: deriva lenta infinita ── */
  #cgbio .cg-bg {
    display: block;
    width: 100%;
    transform-origin: center center;
    animation: bgDrift 14s ease-in-out infinite;
    will-change: transform;
  }

  @keyframes bgDrift {
    0%   { transform: scale(1.07) translateY(-10px); }
    50%  { transform: scale(1.07) translateY(10px);  }
    100% { transform: scale(1.07) translateY(-10px); }
  }

  /* ── Capas absolutas ── */
  #cgbio .cg-abs {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }

  #cgbio .cg-abs img {
    display: block;
    width: 100%;
  }

  /* ── Entrada panel (desde la izquierda) ── */
  .cg-entry-l {
    animation: slideL 1.3s cubic-bezier(0.22, 1, 0.36, 1) 0.4s both;
  }

  @keyframes slideL {
    from { opacity: 0; transform: translateX(-8%); }
    to   { opacity: 1; transform: translateX(0);   }
  }

  /* ── Entrada retrato (desde la derecha) ── */
  .cg-entry-r {
    animation: slideR 1.3s cubic-bezier(0.22, 1, 0.36, 1) 0.7s both;
  }

  @keyframes slideR {
    from { opacity: 0; transform: translateX(8%); }
    to   { opacity: 1; transform: translateX(0);  }
  }

  /* ── Flotación continua del retrato ── */
  .cg-entry-r img {
    animation:
      slideR      1.3s cubic-bezier(0.22, 1, 0.36, 1) 0.7s both,
      cgFloat     5.5s ease-in-out                     2.2s infinite;
  }

  @keyframes cgFloat {
    0%, 100% { transform: translateY(0px);   }
    50%      { transform: translateY(-11px); }
  }

  /* ── Parallax panel/retrato con mouse ── */
  #cgbio .cg-par { will-change: transform; transition: transform 0.8s ease-out; }
</style>
</head>
<body>

<div id="cgbio">

  <!-- Fondo -->
  <img class="cg-bg" id="cgBg"
    src="https://jgalarza95.github.io/cg_backgrounds/popart-design/cg-popart-bio-background-1536px.jpg" alt="">

  <!-- Panel -->
  <div class="cg-abs">
    <div class="cg-par" id="cgParPanel">
      <div class="cg-entry-l">
        <img src="https://jgalarza95.github.io/cg_backgrounds/popart-design/panels/cg-popart-bio-panel01-1536px.png" alt="">
      </div>
    </div>
  </div>

  <!-- Retrato -->
  <div class="cg-abs">
    <div class="cg-par" id="cgParPort">
      <div class="cg-entry-r">
        <img src="https://jgalarza95.github.io/cg_backgrounds/popart-design/portraits/cg-popart-bio-retrato01-1536px.png" alt="">
      </div>
    </div>
  </div>

</div>

<script>
/* Parallax suave con movimiento del mouse */
(function () {
  var bio  = document.getElementById('cgbio');
  var bg   = document.getElementById('cgBg');
  var pP   = document.getElementById('cgParPanel');
  var pR   = document.getElementById('cgParPort');
  var cx   = 0.5, cy = 0.5;   /* posición normalizada del mouse */
  var rAF  = null;

  function render() {
    var dx = cx - 0.5;   /* -0.5 → +0.5 */
    var dy = cy - 0.5;
    pP.style.transform = 'translate(' + (-dx * 14) + 'px,' + (-dy * 8)  + 'px)';
    pR.style.transform = 'translate(' + ( dx * 10) + 'px,' + ( dy * 6)  + 'px)';
    rAF = null;
  }

  document.addEventListener('mousemove', function (e) {
    cx = e.clientX / window.innerWidth;
    cy = e.clientY / window.innerHeight;
    if (!rAF) rAF = requestAnimationFrame(render);
  });
})();
</script>

</body>
</html>
